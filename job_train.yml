$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

type: command
display_name: flow-pusht

# ここをあなたのCC名に
compute: azureml:NC96ads-A100-v4-eus2-cc

# CI上のこのリポジトリルートを丸ごとスナップショットしてCCへ転送
code: .

command: >-
  TS=$(date +%Y%m%d_%H%M%S) &&
  torchrun --nproc_per_node=4 examples/flow_pusht.py train
  --data_root ${{inputs.data_root}}
  --output_dir ${{outputs.out}}/${TS}

# env/environment.yml で事前に登録した環境を使用
# 登録コマンド: az ml environment create -f env/environment.yml
environment: azureml:flow-matching-env:2

inputs:
  # ここをあなたのデータ配置に合わせて変更
  data_root:
    type: uri_folder
    path: azureml://subscriptions/67c7b9bf-63e4-42c6-8e82-dbeae779fd25/resourcegroups/ml-eus2-rg/workspaces/ml-eus2-ws/datastores/workspaceblobstore/paths/datasets
    mode: ro_mount

outputs:
  out:
    type: uri_folder
    path: azureml://subscriptions/67c7b9bf-63e4-42c6-8e82-dbeae779fd25/resourcegroups/ml-eus2-rg/workspaces/ml-eus2-ws/datastores/workspaceblobstore/paths/outputs/flow-pusht
    mode: rw_mount

resources:
  instance_count: 1

experiment_name: flowpolicy